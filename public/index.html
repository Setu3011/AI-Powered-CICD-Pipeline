<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI CI/CD Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚀 AI Powered CI/CD Pipeline</h1>
        <p class="subtitle">Smart DevOps Monitoring Dashboard</p>

        <div class="card">
            <h2>Pipeline Status</h2>
            <div id="status" class="status success">SUCCESS ✅</div>
        </div>

        <div class="card">
            <h2>Last Build Info</h2>
            <p>Build #12</p>
            <p>Time: <span id="time"></span></p>
        </div>

        <div class="card">
            <h2>AI Suggestion</h2>
            <p id="ai-output">
                No issues detected. System running smoothly 🚀
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
